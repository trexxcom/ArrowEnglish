<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Study - 영어 학습 프로그램</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .programs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .program-card {
            background: white;
            border-radius: 15px;
            padding: 30px 25px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .program-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .program-card h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .program-card p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 English Study</h1>
            <p>영어 학습 프로그램 모음</p>
        </header>

        <div class="programs">
            <a href="vocabulary_card_test.html" class="program-card">
                <div class="icon">🃏</div>
                <h2>단어 카드</h2>
                <p>플래시카드로 단어 암기하기</p>
            </a>

            <a href="vocabulary_quiz.html" class="program-card">
                <div class="icon">✏️</div>
                <h2>단어 퀴즈</h2>
                <p>단어 뜻 테스트하기</p>
            </a>

            <a href="pronunciation_practice.html" class="program-card">
                <div class="icon">🎤</div>
                <h2>발음 연습</h2>
                <p>청크 단위로 발음 연습하기</p>
            </a>

            <a href="sentence_image_test.html" class="program-card">
                <div class="icon">🖼️</div>
                <h2>문장 이미지 테스트</h2>
                <p>이미지로 문장 학습하기</p>
            </a>

            <a href="english_test_advanced.html" class="program-card">
                <div class="icon">🎯</div>
                <h2>영어 종합 테스트</h2>
                <p>고급 영어 실력 평가</p>
            </a>
        </div>

        <footer>
            <p>Made with ❤️ for English fluency</p>
        </footer>
    </div>
</body>
</html>
