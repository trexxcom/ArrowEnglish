<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pronunciation Practice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1625;
            --bg-secondary: #251e35;
            --accent: #c77dff;
            --text-primary: #f5f1ff;
            --text-secondary: #a89cc9;
            --success: #5dfdcb;
            --error: #ff6b9d;
            --warning: #ffd97d;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #2a1f3d 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.6s ease-out;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent) 0%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-style: italic;
        }

        .upload-section {
            background: var(--bg-secondary);
            border: 2px dashed var(--accent);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .upload-group {
            margin-bottom: 20px;
        }

        .upload-label-text {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }

        .upload-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, #9d4edd 100%);
            color: #1a1625;
            border: none;
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans KR', sans-serif;
            box-shadow: 0 4px 15px rgba(199, 125, 255, 0.4);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(199, 125, 255, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .file-name {
            margin-top: 10px;
            padding: 10px;
            background: rgba(93, 253, 203, 0.1);
            border-radius: 8px;
            color: var(--success);
            font-size: 0.9rem;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        .test-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 60px 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s ease-out;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(199, 125, 255, 0.3);
            color: var(--text-primary);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .category-btn:hover {
            background: rgba(199, 125, 255, 0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .category-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .category-count {
            font-size: 0.9rem;
            color: var(--success);
        }

        .question-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .question-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: 600;
        }

        .word-display {
            text-align: center;
            margin: 40px 0;
        }

        .english-word {
            font-family: 'Crimson Text', serif;
            font-size: 4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .korean-meaning {
            font-size: 2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .instruction {
            text-align: center;
            font-size: 1.2rem;
            color: var(--warning);
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 217, 125, 0.1);
            border-radius: 12px;
            border: 2px solid rgba(255, 217, 125, 0.3);
        }

        .pronunciation-display {
            text-align: center;
            margin: 40px 0;
            animation: fadeIn 0.5s ease-out;
        }

        .pronunciation-label {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .pronunciation-text {
            font-family: 'Crimson Text', serif;
            font-size: 3rem;
            color: var(--accent);
            font-weight: 600;
            padding: 20px;
            background: rgba(199, 125, 255, 0.1);
            border-radius: 15px;
            border: 2px solid rgba(199, 125, 255, 0.3);
        }

        .answer-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .answer-btn {
            min-width: 150px;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid;
            font-weight: 700;
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, var(--success) 0%, #38d9a9 100%);
            color: #1a1625;
            border-color: var(--success);
        }

        .answer-btn.correct:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(93, 253, 203, 0.5);
        }

        .answer-btn.incorrect {
            background: linear-gradient(135deg, var(--error) 0%, #f85190 100%);
            color: white;
            border-color: var(--error);
        }

        .answer-btn.incorrect:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.5);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #9d4edd 100%);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .navigation {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pronunciation Practice</h1>
            <p class="subtitle">영어 발음 연습</p>
        </header>

        <div id="app">
            <div class="upload-section">
                <div class="upload-group">
                    <label class="upload-label-text">📊 단어 데이터 엑셀 파일</label>
                    <p class="upload-description">'No', '구분', '뜻', '영어단어', '발음' 열이 포함된 엑셀 파일</p>
                    <div class="file-input-wrapper">
                        <input type="file" id="excel-upload" accept=".xlsx,.xls" style="display:none;" />
                        <button class="btn" onclick="document.getElementById('excel-upload').click()">
                            엑셀 파일 선택
                        </button>
                    </div>
                    <div class="file-name" id="excel-file-name"></div>
                </div>

                <div style="margin-top: 30px;">
                    <button class="btn" id="start-btn" onclick="startTest()">
                        학습 시작하기
                    </button>
                </div>
            </div>

            <div id="category-selection" style="display: none;"></div>
            <div id="test-area" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let excelData = [];
        let allExcelData = []; // Store all data including memorized words
        let testData = [];
        let currentQuestion = 0;
        let userAnswers = [];
        let selectedCategory = '';
        let pronunciationShown = false;
        let autoStartAfterUpload = false;

        document.getElementById('excel-upload').addEventListener('change', handleExcelUpload);

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Check filename if triggered from start button
            if (autoStartAfterUpload) {
                const htmlFileName = window.location.pathname.split('/').pop().replace('.html', '');
                const expectedFileName = htmlFileName + '.xlsx';
                
                if (file.name !== expectedFileName) {
                    const proceed = confirm(
                        `⚠️ 파일명이 다릅니다!\n\n` +
                        `예상 파일명: ${expectedFileName}\n` +
                        `선택한 파일: ${file.name}\n\n` +
                        `계속 진행하시겠습니까?`
                    );
                    
                    if (!proceed) {
                        autoStartAfterUpload = false;
                        e.target.value = '';
                        return;
                    }
                }
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                    if (jsonData.length === 0) {
                        alert('엑셀 파일에 데이터가 없습니다.');
                        return;
                    }

                    excelData = jsonData;
                    allExcelData = [...jsonData]; // Keep copy of all data
                    
                    // Filter out words with '외운것' >= 3 if column exists
                    if (excelData.length > 0 && excelData[0].hasOwnProperty('외운것')) {
                        const originalCount = excelData.length;
                        excelData = excelData.filter(item => {
                            const memoryCount = item['외운것'];
                            return memoryCount === null || memoryCount === undefined || memoryCount === '' || parseInt(memoryCount) < 3;
                        });
                        const filteredCount = originalCount - excelData.length;
                        if (filteredCount > 0) {
                            console.log(`${filteredCount}개의 단어가 필터링되었습니다 (외운것 >= 3)`);
                        }
                    }
                    
                    document.getElementById('excel-file-name').textContent = `✓ ${excelData.length}개의 단어 데이터가 로드되었습니다`;
                    document.getElementById('excel-file-name').classList.add('show');
                    
                    // Auto-start if triggered from start button
                    if (autoStartAfterUpload) {
                        autoStartAfterUpload = false;
                        document.querySelector('.upload-section').style.display = 'none';
                        showCategorySelection();
                    }
                    
                    document.getElementById('start-btn').disabled = false;
                } catch (error) {
                    alert('엑셀 파일을 읽는 중 오류가 발생했습니다: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function startTest() {
            if (excelData.length > 0) {
                document.querySelector('.upload-section').style.display = 'none';
                showCategorySelection();
                return;
            }
            
            autoStartAfterUpload = true;
            document.getElementById('excel-upload').click();
        }

        function showCategorySelection() {
            const categories = {};
            
            excelData.forEach(item => {
                const category = item['구분'];
                const no = item['No'];
                
                if (!categories[category]) {
                    categories[category] = {
                        count: 0,
                        minNo: no,
                        maxNo: no
                    };
                }
                
                categories[category].count++;
                if (no < categories[category].minNo) categories[category].minNo = no;
                if (no > categories[category].maxNo) categories[category].maxNo = no;
            });

            const categoryKeys = Object.keys(categories).sort();
            
            let html = `
                <div class="test-card">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent); margin-bottom: 10px;">
                            학습할 단어 구분을 선택하세요
                        </h2>
                        <p style="color: var(--text-secondary); font-size: 1rem;">
                            총 <span style="color: var(--accent); font-weight: 600;">${excelData.length}</span>개 단어 / 
                            <span style="color: var(--accent); font-weight: 600;">${categoryKeys.length}</span>개 구분
                        </p>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;">
                            <button class="btn" onclick="showNumberRanges()" style="padding: 10px 25px; background: linear-gradient(135deg, var(--accent) 0%, #9d4edd 100%);">
                                📊 100개씩 구분
                            </button>
                            <button class="btn" onclick="showRandomTest()" style="padding: 10px 25px; background: linear-gradient(135deg, #ffd97d 0%, #ffb347 100%); color: #1a1625;">
                                🎲 랜덤 테스트
                            </button>
                            <button class="btn btn-secondary" onclick="showWordCategories()" style="padding: 10px 25px;">
                                📚 단어 구분으로 보기
                            </button>
                        </div>
                    </div>

                    <div id="selection-content"></div>
                    
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="btn btn-secondary" onclick="location.reload()">
                            파일 다시 선택
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('category-selection').innerHTML = html;
            document.getElementById('category-selection').style.display = 'block';
            
            showNumberRanges();
        }

        function showRandomTestContent() {
            let html = '<div class="category-grid">';
            
            const randomOptions = [
                { count: 10, label: '10개 랜덤' },
                { count: 20, label: '20개 랜덤' },
                { count: 30, label: '30개 랜덤' },
                { count: 50, label: '50개 랜덤' },
                { count: 60, label: '60개 랜덤' }
            ];
            
            randomOptions.forEach(option => {
                const availableCount = Math.min(option.count, excelData.length);
                html += `
                    <button class="category-btn" onclick="selectRandomTest(${option.count})">
                        <div class="category-name">🎲 ${option.label}</div>
                        <div class="category-count">${availableCount}개 단어</div>
                    </button>
                `;
            });
            
            html += '</div>';
            document.getElementById('selection-content').innerHTML = html;
        }

        function showRandomTest() {
            showRandomTestContent();
        }

        function showNumberRanges() {
            // Use filtered data (unmemorized words only)
            const chunkSize = 100;
            
            let html = '<div class="category-grid">';
            
            for (let i = 0; i < excelData.length; i += chunkSize) {
                const start = i + 1;
                const end = Math.min(i + chunkSize, excelData.length);
                const wordsInChunk = excelData.slice(i, i + chunkSize);
                
                html += `
                    <button class="category-btn" onclick="selectNumberChunk(${i}, ${i + chunkSize})">
                        <div class="category-name">외울 것 ${start} ~ ${end}</div>
                        <div class="category-count">${wordsInChunk.length}개 단어</div>
                    </button>
                `;
            }
            
            html += '</div>';
            document.getElementById('selection-content').innerHTML = html;
        }

        function showWordCategories() {
            const categories = {};
            
            excelData.forEach(item => {
                const category = item['구분'];
                const no = item['No'];
                
                if (!categories[category]) {
                    categories[category] = {
                        count: 0,
                        minNo: no,
                        maxNo: no
                    };
                }
                
                categories[category].count++;
                if (no < categories[category].minNo) categories[category].minNo = no;
                if (no > categories[category].maxNo) categories[category].maxNo = no;
            });

            const categoryKeys = Object.keys(categories).sort();
            let html = '<div class="category-grid">';
            
            categoryKeys.forEach(category => {
                const info = categories[category];
                html += `
                    <button class="category-btn" onclick="selectCategory('${category}')">
                        <div class="category-name">${category}</div>
                        <div class="category-range">No. ${info.minNo} ~ ${info.maxNo}</div>
                        <div class="category-count">${info.count}개 단어</div>
                    </button>
                `;
            });
            
            html += '</div>';
            document.getElementById('selection-content').innerHTML = html;
        }

        function selectRandomTest(count) {
            const shuffled = [...excelData].sort(() => Math.random() - 0.5);
            testData = shuffled.slice(0, Math.min(count, excelData.length));
            selectedCategory = `랜덤 테스트 ${testData.length}개`;
            
            startQuiz();
        }

        function selectNumberChunk(startIdx, endIdx) {
            const start = startIdx + 1;
            const end = Math.min(endIdx, excelData.length);
            selectedCategory = `외울 것 ${start} ~ ${end}`;
            testData = excelData.slice(startIdx, endIdx);
            
            startQuiz();
        }

        function selectCategory(category) {
            selectedCategory = category;
            testData = excelData.filter(item => item['구분'] === category);
            
            startQuiz();
        }

        function startQuiz() {
            currentQuestion = 0;
            userAnswers = new Array(testData.length).fill(null);

            document.getElementById('category-selection').style.display = 'none';
            document.getElementById('test-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            pronunciationShown = false;
            const question = testData[currentQuestion];
            const progress = ((currentQuestion + 1) / testData.length) * 100;
            const correctCount = userAnswers.filter(a => a === true).length;

            const html = `
                <div class="test-card">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    
                    <div class="question-header">
                        <div class="question-number">문제 ${currentQuestion + 1} / ${testData.length}</div>
                        <div style="margin-top: 10px; color: var(--success); font-weight: 600;">
                            ✓ 맞춘 단어: ${correctCount}
                        </div>
                    </div>

                    <div class="word-display">
                        <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
                            <div class="english-word">${question['영어단어']}</div>
                            <button onclick="speakWord('${question['영어단어']}')" style="background: rgba(255, 255, 255, 0.1); border: 2px solid var(--accent); color: var(--accent); padding: 15px 20px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; transition: all 0.3s ease; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.background='rgba(199, 125, 255, 0.2)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'">
                                🔊
                            </button>
                        </div>
                        <div class="korean-meaning">${question['뜻']}</div>
                    </div>

                    <div class="instruction">
                        🎤 위 단어를 소리내어 발음해보세요
                    </div>

                    <div id="pronunciation-area"></div>

                    <div style="text-align: center;">
                        <button class="btn" id="show-pronunciation-btn" onclick="showPronunciation()" style="max-width: 300px; margin: 20px auto;">
                            확인 (발음 보기)
                        </button>
                    </div>

                    <div id="answer-buttons-area"></div>

                    <div style="margin-top: 40px; text-align: center;">
                        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">
                            💡 발음 가이드
                        </div>
                        <img src="pronunciation_guide.png" alt="Pronunciation Guide" style="max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);" />
                    </div>
                </div>
            `;

            document.getElementById('test-area').innerHTML = html;
        }

        function showPronunciation() {
            if (pronunciationShown) return;
            
            pronunciationShown = true;
            const question = testData[currentQuestion];
            const pronunciation = question['발음'] || '(발음 정보 없음)';

            document.getElementById('pronunciation-area').innerHTML = `
                <div class="pronunciation-display">
                    <div class="pronunciation-label">발음 기호</div>
                    <div class="pronunciation-text">${pronunciation}</div>
                </div>
            `;

            document.getElementById('show-pronunciation-btn').style.display = 'none';

            document.getElementById('answer-buttons-area').innerHTML = `
                <div class="answer-buttons">
                    <button class="answer-btn correct" onclick="answerQuestion(true)">
                        ⭕ 맞았어요
                    </button>
                    <button class="answer-btn incorrect" onclick="answerQuestion(false)">
                        ❌ 틀렸어요
                    </button>
                </div>
            `;
        }

        function answerQuestion(isCorrect) {
            userAnswers[currentQuestion] = isCorrect;

            if (currentQuestion < testData.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const correctCount = userAnswers.filter(a => a === true).length;
            const incorrectCount = userAnswers.filter(a => a === false).length;
            const totalCount = testData.length;
            const percentage = Math.round((correctCount / totalCount) * 100);

            let resultsHtml = `
                <div class="test-card">
                    <div style="text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px;">
                        🎉 발음 연습 완료!
                    </div>
                    
                    <div style="text-align: center; font-size: 1rem; color: var(--text-secondary); margin-bottom: 30px;">
                        ${selectedCategory}
                    </div>
                    
                    <div style="text-align: center; font-size: 4rem; font-weight: 700; margin: 30px 0;">
                        <span style="color: var(--success);">${correctCount}</span>
                        <span style="color: var(--text-secondary);"> / </span>
                        <span style="color: var(--accent);">${totalCount}</span>
                    </div>
                    
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value">${totalCount}</div>
                            <div class="stat-label">총 단어</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="color: var(--success);">${correctCount}</div>
                            <div class="stat-label">맞춘 단어</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="color: var(--error);">${incorrectCount}</div>
                            <div class="stat-label">틀린 단어</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${percentage}%</div>
                            <div class="stat-label">정확도</div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 40px;">
                        <div style="font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; text-align: center;">
                            단어별 결과
                        </div>
            `;

            userAnswers.forEach((answer, index) => {
                const question = testData[index];
                const resultColor = answer ? 'var(--success)' : 'var(--error)';
                const resultIcon = answer ? '⭕' : '❌';

                resultsHtml += `
                    <div style="margin: 15px 0; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; border-left: 4px solid ${resultColor};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div>
                                <span style="font-family: 'Crimson Text', serif; font-size: 1.5rem; color: var(--accent); font-weight: 600;">${question['영어단어']}</span>
                                <span style="font-size: 1.2rem; color: var(--text-secondary); margin-left: 15px;">${question['발음'] || ''}</span>
                            </div>
                            <div style="font-size: 1.5rem;">${resultIcon}</div>
                        </div>
                        <div style="font-size: 1rem; color: var(--text-secondary);">
                            ${question['뜻']}
                        </div>
                    </div>
                `;
            });

            resultsHtml += `
                    </div>
                    
                    <div class="navigation" style="margin-top: 40px;">
                        <button class="btn btn-secondary" onclick="backToCategorySelection()">처음으로</button>
                        <button class="btn" onclick="downloadResults()" style="background: linear-gradient(135deg, var(--success) 0%, #38d9a9 100%);">
                            📥 결과 다운로드
                        </button>
                        <button class="btn btn-secondary" onclick="reviewWrong()">틀린 것만 복습</button>
                    </div>
                </div>
            `;

            document.getElementById('test-area').innerHTML = resultsHtml;
        }

        function backToCategorySelection() {
            document.getElementById('test-area').style.display = 'none';
            document.getElementById('category-selection').style.display = 'block';
            
            testData = [];
            currentQuestion = 0;
            userAnswers = [];
            selectedCategory = '';
        }

        function reviewWrong() {
            const wrongWords = [];
            userAnswers.forEach((answer, index) => {
                if (answer === false) {
                    wrongWords.push(testData[index]);
                }
            });

            if (wrongWords.length === 0) {
                alert('틀린 단어가 없습니다!');
                return;
            }

            testData = wrongWords;
            selectedCategory = `틀린 단어 복습 (${wrongWords.length}개)`;
            currentQuestion = 0;
            userAnswers = new Array(testData.length).fill(null);
            
            showQuestion();
        }

        function downloadResults() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            
            const resultsData = testData.map((item, index) => {
                const isCorrect = userAnswers[index];
                const memoryCount = isCorrect ? 1 : 0;
                
                return {
                    'No': item['No'],
                    '영어단어': item['영어단어'],
                    '날짜': dateStr,
                    '외운것': memoryCount
                };
            });

            const ws = XLSX.utils.json_to_sheet(resultsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '발음연습결과');
            
            const filename = `pronunciation_results_${selectedCategory.replace(/[^a-zA-Z0-9가-힣]/g, '_')}_${dateStr}.xlsx`;
            XLSX.writeFile(wb, filename);
        }

        function speakWord(word) {
            // Check if browser supports speech synthesis
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                // Create utterance
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US'; // Set language to English
                utterance.rate = 0.8; // Slow down speech rate for better pronunciation
                utterance.pitch = 1.0;
                
                // Speak
                window.speechSynthesis.speak(utterance);
            } else {
                alert('죄송합니다. 이 브라우저는 음성 재생을 지원하지 않습니다.');
            }
        }
    </script>
</body>
</html>
